services:
  it-tools-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: it-tools-dev
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    command: sh -c "pnpm install --no-frozen-lockfile && pnpm dev --host 0.0.0.0"
